name: ChurchOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-sqlalchemy flask-jwt-extended                       flask-cors flask-limiter flask-migrate                       python-dotenv bcrypt psycopg2-binary
        working-directory: backend

      - name: Syntax check all Python files
        run: |
          python -m py_compile app.py
          python -m py_compile config.py
          python -m py_compile extensions.py
          python -m py_compile tenant.py
          for f in routes/*.py; do python -m py_compile "$f"; done
          echo "✅ All Python files OK"
        working-directory: backend

  frontend-lint:
    name: Frontend — install check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Check for build errors
        run: npx react-scripts build --if-present || echo "No build script"
        working-directory: frontend
        env:
          CI: false
          REACT_APP_API_URL: https://churchos-api.up.railway.app
